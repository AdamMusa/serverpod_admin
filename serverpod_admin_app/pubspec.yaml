name: serverpod_admin_app
description: Prebuilt Flutter web app for serving Serverpod Admin from a Serverpod backend.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  serverpod_admin_client: ^1.0.7
  serverpod_admin_dashboard:
    path: ../serverpod_admin_dashboard
  serverpod_auth_core_client: ^3.4.10
  serverpod_auth_idp_client: ^3.4.10
  serverpod_auth_idp_flutter: ^3.4.10
  serverpod_client: ^3.4.10
  serverpod_flutter: ^3.4.10

dev_dependencies:
  flutter_lints: '>=3.0.0 <7.0.0'
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
